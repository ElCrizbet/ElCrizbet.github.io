<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Club de Fans CR7</title>
  <link rel="shortcut icon" href="../dist/imagenes/UNETE.png">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="../dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../dist/css/styles.css">
</head>
<body>

  <section class="cr7-section container text-center mt-5">
    <h1 class="mb-3">Página de Fans de CR7</h1>
    <p class="cr7-frase">“Tu amor me motiva. Tu odio me hace imparable.” – Cristiano Ronaldo</p>

    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="cr7-form-box p-4">
          <h2 class="cr7-form-title">Únete al legado del GOAT 🐐</h2>
          <form action="https://www.cristianoronaldo.com/#cr7" method="get">
            <div class="mb-3 text-start">
              <label for="nombre" class="form-label">Nombre:</label>
              <input type="text" class="form-control" id="nombre" name="nombre" required>
            </div>
            <div class="mb-3 text-start">
              <label for="email" class="form-label">Email:</label>
              <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <div class="mb-3 text-start">
              <label for="pais" class="form-label">País:</label>
              <input type="text" class="form-control" id="pais" name="pais">
            </div>
            <div class="d-grid">
              <button type="submit" class="btn cr7-btn">Siuuu! Ir a CR7.com</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <p class="cr7-frase mt-5">“Tu cuerpo puede aguantar casi todo. Es tu mente la que tienes que convencer.”</p>
    <footer class="mt-4 cr7-footer">© 2025 Página de Fans de Cristiano Ronaldo - Zahir</footer>
  </section>
  <script src="../dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
